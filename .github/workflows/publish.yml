name: Publish to npm

on:
  push:
    branches:
      - main
    paths:
      - 'package.json'  # 只在 package.json 变化时触发

  # 允许手动触发
  workflow_dispatch:
    inputs:
      force_publish:
        description: '强制发布（跳过 commit 关键词检测）'
        required: false
        type: boolean
        default: false

# 设置权限 - provenance 需要 id-token: write
permissions:
  contents: read
  id-token: write

# 防止并发发布
concurrency:
  group: "npm-publish"
  cancel-in-progress: false

jobs:
  check-publish:
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      new_version: ${{ steps.check.outputs.version }}
      is_beta: ${{ steps.check.outputs.is_beta }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check commit message and version
        id: check
        run: |
          # 获取当前版本
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current version: $CURRENT_VERSION"
          echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT

          # 检查是否为 beta 版本
          if [[ "$CURRENT_VERSION" == *"beta"* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
            echo "This is a beta version"
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
            echo "This is a release version"
          fi

          # 强制发布时跳过 commit 关键词检测
          FORCE_PUBLISH="${{ github.event.inputs.force_publish }}"
          if [ "$FORCE_PUBLISH" == "true" ]; then
            echo "Force publish enabled"
            echo "should_publish=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # 根据本次提交的 commit message 是否包含 "publish" 决定是否发布
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qi "publish"; then
            echo "Commit message contains 'publish', will publish"
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "Commit message does not contain 'publish', skip publish"
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

  publish-beta:
    needs: check-publish
    if: needs.check-publish.outputs.should_publish == 'true' && needs.check-publish.outputs.is_beta == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 自动从 package.json 的 packageManager 字段读取版本

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Publish Beta to npm
        run: npm publish --tag beta --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 🧪 Beta Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.check-publish.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install advanced-ele-ui@beta" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  publish-release:
    needs: check-publish
    if: needs.check-publish.outputs.should_publish == 'true' && needs.check-publish.outputs.is_beta == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        # 自动从 package.json 的 packageManager 字段读取版本

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Publish Release to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        run: |
          echo "## 🚀 Release Published!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.check-publish.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Install:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install advanced-ele-ui@${{ needs.check-publish.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
